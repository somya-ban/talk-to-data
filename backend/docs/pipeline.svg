<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117;border-radius:12px;font-family:'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arr-active" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background grid lines -->
  <g opacity="0.05">
    <line x1="0" y1="70" x2="900" y2="70" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="900" y2="140" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="900" y2="210" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="900" y2="280" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="900" y2="350" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#f9fafb" font-size="14" font-weight="700" letter-spacing="3" opacity="0.9">TALK TO DATA — GRAPH-RAG PIPELINE</text>
  <text x="450" y="48" text-anchor="middle" fill="#6b7280" font-size="10" letter-spacing="1">NatWest Code for Purpose 2026 · Theme 1: Seamless Self-Service Intelligence</text>

  <!-- ── BOX 1: User Question ── -->
  <g filter="url(#glow)">
    <rect x="20" y="80" width="130" height="70" rx="10" fill="url(#g1)" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="85" y="108" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">💬 USER</text>
  <text x="85" y="124" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">QUESTION</text>
  <text x="85" y="140" text-anchor="middle" fill="#6b7280" font-size="9">Natural Language</text>

  <!-- Arrow 1→2 -->
  <line x1="152" y1="115" x2="188" y2="115" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-active)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- ── BOX 2: Schema Linker (CENTER) ── -->
  <g filter="url(#glow)">
    <rect x="195" y="65" width="200" height="185" rx="12" fill="#0d1117" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3">
      <animate attributeName="stroke" values="#4b5563;#6b7280;#4b5563" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="295" y="85" text-anchor="middle" fill="#9ca3af" font-size="9" letter-spacing="2">SCHEMA LINKER</text>

  <!-- ChromaDB sub-box -->
  <rect x="208" y="92" width="82" height="65" rx="8" fill="url(#g2)" opacity="0.12" stroke="#0ea5e9" stroke-width="1"/>
  <text x="249" y="114" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">🗄 ChromaDB</text>
  <text x="249" y="128" text-anchor="middle" fill="#7dd3fc" font-size="8">DDL vectors</text>
  <text x="249" y="140" text-anchor="middle" fill="#7dd3fc" font-size="8">Doc vectors</text>
  <text x="249" y="152" text-anchor="middle" fill="#7dd3fc" font-size="8">Q-SQL pairs</text>

  <!-- Neo4j sub-box -->
  <rect x="302" y="92" width="82" height="65" rx="8" fill="url(#g3)" opacity="0.12" stroke="#10b981" stroke-width="1"/>
  <text x="343" y="114" text-anchor="middle" fill="#34d399" font-size="10" font-weight="700">🕸 Neo4j</text>
  <text x="343" y="128" text-anchor="middle" fill="#6ee7b7" font-size="8">Graph nodes</text>
  <text x="343" y="140" text-anchor="middle" fill="#6ee7b7" font-size="8">Join paths</text>
  <text x="343" y="152" text-anchor="middle" fill="#6ee7b7" font-size="8">FK edges</text>

  <!-- Schema Context output -->
  <rect x="208" y="170" width="176" height="30" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="296" y="183" text-anchor="middle" fill="#d1d5db" font-size="8">📦 SchemaContext object</text>
  <text x="296" y="194" text-anchor="middle" fill="#6b7280" font-size="7.5">DDLs · Docs · JoinPaths · Q-SQL pairs</text>

  <!-- Arrow 2→3 -->
  <line x1="398" y1="155" x2="434" y2="155" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-active)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- ── BOX 3: SQL Generator ── -->
  <g filter="url(#glow)">
    <rect x="440" y="110" width="140" height="90" rx="10" fill="url(#g4)" opacity="0.12" stroke="#f59e0b" stroke-width="1.5">
      <animate attributeName="opacity" values="0.12;0.22;0.12" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="510" y="138" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">🤖 SQL GENERATOR</text>
  <text x="510" y="154" text-anchor="middle" fill="#fcd34d" font-size="9">Groq · llama-3.3-70b</text>
  <text x="510" y="168" text-anchor="middle" fill="#9ca3af" font-size="8">Prompt construction</text>
  <text x="510" y="180" text-anchor="middle" fill="#9ca3af" font-size="8">SQL extraction</text>
  <text x="510" y="193" text-anchor="middle" fill="#9ca3af" font-size="8">Validation · Retry loop</text>

  <!-- Arrow 3→4 -->
  <line x1="583" y1="155" x2="619" y2="155" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-active)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1s" repeatCount="indefinite"/>
  </line>

  <!-- ── BOX 4: Executor ── -->
  <g filter="url(#glow)">
    <rect x="625" y="110" width="130" height="90" rx="10" fill="url(#g3)" opacity="0.12" stroke="#10b981" stroke-width="1.5">
      <animate attributeName="opacity" values="0.12;0.22;0.12" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="690" y="138" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">⚡ EXECUTOR</text>
  <text x="690" y="154" text-anchor="middle" fill="#6ee7b7" font-size="9">DuckDB · In-memory</text>
  <text x="690" y="168" text-anchor="middle" fill="#9ca3af" font-size="8">SQL execution</text>
  <text x="690" y="180" text-anchor="middle" fill="#9ca3af" font-size="8">DataFrame results</text>
  <text x="690" y="193" text-anchor="middle" fill="#9ca3af" font-size="8">Error feedback loop</text>

  <!-- Arrow 4→5 -->
  <line x1="757" y1="155" x2="783" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-active)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- ── BOX 5: Results ── -->
  <g filter="url(#glow)">
    <rect x="790" y="110" width="95" height="90" rx="10" fill="url(#g5)" opacity="0.15" stroke="#ec4899" stroke-width="1.5">
      <animate attributeName="opacity" values="0.15;0.28;0.15" dur="3s" begin="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="837" y="136" text-anchor="middle" fill="#f9a8d4" font-size="10" font-weight="700">📊 RESULTS</text>
  <text x="837" y="152" text-anchor="middle" fill="#fbcfe8" font-size="8">SQL Query</text>
  <text x="837" y="165" text-anchor="middle" fill="#fbcfe8" font-size="8">DataFrame</text>
  <text x="837" y="178" text-anchor="middle" fill="#fbcfe8" font-size="8">Chart</text>
  <text x="837" y="191" text-anchor="middle" fill="#fbcfe8" font-size="8">Explanation</text>

  <!-- ── BOTTOM ROW: Data Sources ── -->
  <!-- JSONL files -->
  <rect x="20" y="295" width="130" height="55" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="85" y="315" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">📁 JSONL Schema</text>
  <text x="85" y="330" text-anchor="middle" fill="#6b7280" font-size="8">25 tables · 25 relations</text>
  <text x="85" y="343" text-anchor="middle" fill="#6b7280" font-size="8">FK-validated data</text>

  <!-- Dotted line up to Schema Linker -->
  <line x1="85" y1="293" x2="85" y2="260" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="85" y1="260" x2="250" y2="260" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="250" y1="260" x2="250" y2="248" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Synthetic data -->
  <rect x="200" y="295" width="130" height="55" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="265" y="315" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">🔧 Synthetic Data</text>
  <text x="265" y="330" text-anchor="middle" fill="#6b7280" font-size="8">50-100 rows/table</text>
  <text x="265" y="343" text-anchor="middle" fill="#6b7280" font-size="8">Realistic banking data</text>

  <!-- Dotted line to executor -->
  <line x1="265" y1="293" x2="265" y2="270" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="265" y1="270" x2="690" y2="270" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="690" y1="270" x2="690" y2="202" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Metric dict -->
  <rect x="380" y="295" width="130" height="55" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="445" y="315" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">📖 Metric Dictionary</text>
  <text x="445" y="330" text-anchor="middle" fill="#6b7280" font-size="8">User-confirmed defs</text>
  <text x="445" y="343" text-anchor="middle" fill="#6b7280" font-size="8">add_documentation()</text>

  <!-- Dotted line to chromadb -->
  <line x1="445" y1="293" x2="445" y2="270" stroke="#374151" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="445" y1="270" x2="249" y2="270" stroke="#374151" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Fix loop -->
  <rect x="560" y="295" width="150" height="55" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="635" y="315" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">🔄 Fix Loop</text>
  <text x="635" y="330" text-anchor="middle" fill="#6b7280" font-size="8">Error → Regenerate SQL</text>
  <text x="635" y="343" text-anchor="middle" fill="#6b7280" font-size="8">Store correction → ChromaDB</text>

  <!-- Fix loop arrow back -->
  <path d="M 690 202 Q 690 255 635 253 Q 580 251 580 295" stroke="#ef4444" stroke-width="1" fill="none" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Travelling dot animation on main pipeline -->
  <circle r="4" fill="#a78bfa" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 152,115 L 195,115 L 295,155 L 398,155 L 440,155 L 583,155 L 625,155 L 757,155 L 790,155"/>
  </circle>

  <!-- Labels at bottom -->
  <text x="450" y="395" text-anchor="middle" fill="#374151" font-size="8" letter-spacing="1">INGESTION LAYER · RETRIEVAL LAYER · GENERATION LAYER · EXECUTION LAYER</text>
  <text x="450" y="410" text-anchor="middle" fill="#1f2937" font-size="8" letter-spacing="1">ChromaDB · Neo4j AuraDB · Groq API · DuckDB · Flask · React</text>
</svg>
